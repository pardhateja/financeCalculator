        <!-- TAB 10: SIP CALCULATOR -->
        <div class="tab-content" id="tab-sip">
            <div class="panel">
                <h2>SIP Calculator</h2>
                <div class="panel-grid">
                    <div>
                        <div class="section-group">
                            <h3>SIP Details</h3>
                            <div class="input-group">
                                <label for="sipAmount">Monthly SIP Amount</label>
                                <input type="number" id="sipAmount" value="50000">
                                <span class="unit">&#8377;/mo</span>
                            </div>
                            <div class="input-group">
                                <label for="sipReturn">Expected Return</label>
                                <input type="number" id="sipReturn" value="12" step="0.1">
                                <span class="unit">%</span>
                            </div>
                            <div class="input-group">
                                <label for="sipYears">Investment Period</label>
                                <input type="number" id="sipYears" value="10" min="1" max="50">
                                <span class="unit">years</span>
                            </div>
                            <div class="input-group">
                                <label for="sipStepUp">Annual Step-Up</label>
                                <input type="number" id="sipStepUp" value="5" step="0.5">
                                <span class="unit">%</span>
                            </div>
                        </div>
                        <div class="summary-row">
                            <div class="summary-card success">
                                <div class="label">Total Corpus</div>
                                <div class="value" id="sipCorpus">&#8377;0</div>
                            </div>
                            <div class="summary-card">
                                <div class="label">Total Invested</div>
                                <div class="value" id="sipInvested">&#8377;0</div>
                            </div>
                            <div class="summary-card warning">
                                <div class="label">Wealth Gained</div>
                                <div class="value" id="sipGained">&#8377;0</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="section-group green-accent">
                            <h3>Year-wise Growth</h3>
                            <div class="projection-table-wrapper" style="max-height:400px;overflow-y:auto;">
                                <table class="projection-table">
                                    <thead><tr><th>Year</th><th>Invested</th><th>Corpus</th><th>Gain</th></tr></thead>
                                    <tbody id="sipTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
