        <!-- TAB: LOAN/EMI IMPACT -->
        <div class="tab-content" id="tab-loan">
            <div class="panel">
                <h2>Loan / EMI Impact</h2>
                <div class="panel-grid">
                    <div>
                        <div class="section-group">
                            <h3>Loan Details</h3>
                            <div class="input-group">
                                <label for="loanPrincipal">Loan Amount</label>
                                <input type="number" id="loanPrincipal" value="5000000">
                                <span class="unit">&#8377;</span>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="loanRate">Interest Rate</label>
                                    <input type="number" id="loanRate" value="8.5" step="0.1">
                                    <span class="unit">%</span>
                                </div>
                                <div class="input-group">
                                    <label for="loanTenure">Tenure</label>
                                    <input type="number" id="loanTenure" value="20" min="1" max="30">
                                    <span class="unit">years</span>
                                </div>
                            </div>
                        </div>
                        <div class="summary-row">
                            <div class="summary-card danger">
                                <div class="label">Monthly EMI</div>
                                <div class="value" id="loanEMI">-</div>
                            </div>
                            <div class="summary-card warning">
                                <div class="label">Total Interest</div>
                                <div class="value" id="loanTotalInterest">-</div>
                            </div>
                            <div class="summary-card">
                                <div class="label">Total Payment</div>
                                <div class="value" id="loanTotalPayment">-</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="section-group red-accent">
                            <h3>Impact on Retirement</h3>
                            <div class="sub-text" style="margin-bottom:12px;color:var(--text-secondary);">How this EMI affects your retirement projections (reduces monthly investment during loan tenure)</div>
                            <div class="summary-row">
                                <div class="summary-card danger">
                                    <div class="label">Corpus at Retirement</div>
                                    <div class="value" id="loanImpactCorpus">-</div>
                                </div>
                                <div class="summary-card warning">
                                    <div class="label">Money Lasts Until</div>
                                    <div class="value" id="loanImpactRunsOut">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
